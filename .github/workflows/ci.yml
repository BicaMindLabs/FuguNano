name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Custom secret gate (placeholder + fingerprint)
        run: npm run scan
      - name: gitleaks (full history)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

  launchers:
    name: Launcher syntax + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Launcher syntax
        run: npm run lint:launchers
      - name: Docs match code (README ↔ fuguectl subcommands/counts)
        run: npm run check:docs

  node:
    name: Plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: install engine
        run: npm ci
        working-directory: engine
      - name: build engine (fuguectl shims delegate to engine/dist/cli/main.js)
        run: npm run build
        working-directory: engine
      - name: npm test
        run: npm test

  engine:
    name: Engine (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: install
        run: npm ci
        working-directory: engine
      - name: check (typecheck + lint + test)
        run: npm run check
        working-directory: engine

  gui:
    name: Desktop GUI (renderer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      # --ignore-scripts skips Electron's binary postinstall (~100 MB) — the
      # renderer typecheck + Vite build never touch the runtime binary.
      - name: install (no electron binary)
        run: npm ci --ignore-scripts
        working-directory: benchmarks/case-d-gui/desktop
      - name: typecheck
        run: npm run typecheck
        working-directory: benchmarks/case-d-gui/desktop
      - name: test (selector parity / drift guard)
        run: npm test
        working-directory: benchmarks/case-d-gui/desktop
      - name: build renderer
        run: npm run build
        working-directory: benchmarks/case-d-gui/desktop
