<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1120 640"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">FuguNano overview</title>
  <desc id="desc">
    A polished overview of the FuguNano multi-agent coding workflow: plan,
    dispatch, join, route, review, ship.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020" />
      <stop offset="0.5" stop-color="#111827" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.14" />
      <stop offset="1" stop-color="#e0f2fe" stop-opacity="0.08" />
    </linearGradient>
    <marker
      id="arrow"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="4"
      orient="auto"
    >
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8" />
    </marker>
    <style>
      .title {
        font:
          800 56px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        fill: #f8fafc;
        letter-spacing: 0;
      }
      .tag {
        font:
          500 19px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        fill: #cbd5e1;
        letter-spacing: 0;
      }
      .cardTitle {
        font:
          750 22px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        fill: #f8fafc;
        letter-spacing: 0;
      }
      .cardText {
        font:
          500 14px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        fill: #cbd5e1;
        letter-spacing: 0;
      }
      .tiny {
        font:
          600 12px ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
        fill: #a5b4fc;
        letter-spacing: 0;
      }
      .chip {
        font:
          700 13px ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
        fill: #dbeafe;
        letter-spacing: 0;
      }
    </style>
  </defs>

  <rect width="1120" height="640" fill="#0b1020" />
  <rect width="1120" height="640" rx="28" fill="url(#bg)" />
  <path
    d="M72 108 H1048 M72 208 H1048 M72 308 H1048 M72 408 H1048 M72 508 H1048 M241 68 V572 M417 68 V572 M593 68 V572 M769 68 V572 M945 68 V572"
    stroke="#1e293b"
    stroke-width="1"
  />
  <rect
    x="34"
    y="34"
    width="1052"
    height="572"
    rx="24"
    fill="none"
    stroke="#334155"
  />

  <text x="80" y="112" class="title">FuguNano</text>
  <text x="80" y="148" class="tag">
    Governed multi-agent coding without training a coordinator.
  </text>
  <text x="80" y="178" class="tag">
    Specialist workers implement. Reviewers judge.
  </text>
  <text x="80" y="206" class="tag">
    Verifier-aware routing. Harnesses improve from failures.
  </text>

  <rect
    x="778"
    y="82"
    width="246"
    height="112"
    rx="18"
    fill="url(#panel)"
    stroke="#475569"
  />
  <text x="812" y="124" class="chip">fuguectl</text>
  <text x="812" y="151" class="cardText">29 subcommands</text>
  <text x="812" y="174" class="cardText">30 test suites · 423 assertions</text>

  <rect
    x="78"
    y="256"
    width="150"
    height="132"
    rx="18"
    fill="#172554"
    stroke="#3b82f6"
  />
  <text x="102" y="302" class="cardTitle">Plan</text>
  <text x="102" y="332" class="cardText">preflight</text>
  <text x="102" y="354" class="cardText">TASK file</text>
  <text x="102" y="376" class="cardText">ownership split</text>

  <rect
    x="254"
    y="256"
    width="150"
    height="132"
    rx="18"
    fill="#052e2b"
    stroke="#14b8a6"
  />
  <text x="278" y="302" class="cardTitle">Dispatch</text>
  <text x="278" y="332" class="cardText">runtime profiles</text>
  <text x="278" y="354" class="cardText">scoped work</text>
  <text x="278" y="376" class="cardText">selected skills</text>

  <rect
    x="430"
    y="256"
    width="150"
    height="132"
    rx="18"
    fill="#2e1065"
    stroke="#a855f7"
  />
  <text x="454" y="302" class="cardTitle">Join</text>
  <text x="454" y="332" class="cardText">cache first</text>
  <text x="454" y="354" class="cardText">N sent, N back</text>
  <text x="454" y="376" class="cardText">durable rounds</text>

  <rect
    x="606"
    y="256"
    width="150"
    height="132"
    rx="18"
    fill="#083344"
    stroke="#22d3ee"
  />
  <text x="630" y="302" class="cardTitle">Route</text>
  <text x="630" y="332" class="cardText">TRUST · gated</text>
  <text x="630" y="354" class="cardText">SPOT-CHECK</text>
  <text x="630" y="376" class="cardText">or ESCALATE</text>

  <rect
    x="782"
    y="256"
    width="150"
    height="132"
    rx="18"
    fill="#431407"
    stroke="#fb923c"
  />
  <text x="806" y="302" class="cardTitle">Review</text>
  <text x="806" y="332" class="cardText">independent</text>
  <text x="806" y="354" class="cardText">ACCEPTED</text>
  <text x="806" y="376" class="cardText">or NEEDS FIX</text>

  <rect
    x="958"
    y="256"
    width="84"
    height="132"
    rx="18"
    fill="#0f2f1d"
    stroke="#22c55e"
  />
  <text x="978" y="302" class="cardTitle">Ship</text>
  <text x="978" y="332" class="cardText">or</text>
  <text x="978" y="354" class="cardText">loop</text>

  <line
    x1="230"
    y1="322"
    x2="252"
    y2="322"
    stroke="#94a3b8"
    stroke-width="2.5"
    marker-end="url(#arrow)"
  />
  <line
    x1="406"
    y1="322"
    x2="428"
    y2="322"
    stroke="#94a3b8"
    stroke-width="2.5"
    marker-end="url(#arrow)"
  />
  <line
    x1="582"
    y1="322"
    x2="604"
    y2="322"
    stroke="#94a3b8"
    stroke-width="2.5"
    marker-end="url(#arrow)"
  />
  <line
    x1="758"
    y1="322"
    x2="780"
    y2="322"
    stroke="#94a3b8"
    stroke-width="2.5"
    marker-end="url(#arrow)"
  />
  <line
    x1="934"
    y1="322"
    x2="956"
    y2="322"
    stroke="#94a3b8"
    stroke-width="2.5"
    marker-end="url(#arrow)"
  />

  <rect
    x="78"
    y="450"
    width="964"
    height="90"
    rx="20"
    fill="#020617"
    stroke="#334155"
  />
  <text x="112" y="486" class="tiny">AGENT RUNTIMES</text>
  <text x="112" y="517" class="cardText">
    fugue-cc profiles · Codex models · OpenCode providers · optional Claude Code
    operator
  </text>
  <text x="112" y="558" class="tiny">SAFETY CONTRACT</text>
  <text x="250" y="558" class="cardText">
    generation is not review · main is the source of truth · deterministic gates
    fail first · secrets stay outside git
  </text>
</svg>
